token_database: data/processed/100style_pruned/fsq_20x9_full_loss

batch_size: 512
epochs: 100
lr: 0.0003
min_lr: 0.00001
warmup_ratio: 0.05
beta1: 0.9
beta2: 0.95
weight_decay: 0.01
grad_clip_norm: 1.0

coordinate_embedding_dim: 16
d_model: 256
num_layers: 6
num_query_heads: 8
num_kv_heads: 4
ff_dim: 768
dropout: 0.1
context_frames: 64
rope_theta: 10000.0
qk_norm: true
norm_eps: 0.00001

num_workers: 8
prefetch_factor: 2
persistent_workers: true
seed: 3407
deterministic: false
early_stop_patience: 15
device: auto

outdir: outputs/fsq_generator
run_name: fsq_generator_transformer_100style
