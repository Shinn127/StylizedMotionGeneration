feature_database: data/processed/100style_test5_pruned/feature_database
split_train: train
split_val: val

batch_size: 512
epochs: 500
lr: 0.0002
min_lr: 0.00001
warmup_epochs: 2
seed: 3407
deterministic: false
grad_clip_norm: 1.0

num_workers: 8
prefetch_factor: 4
pin_memory: true
persistent_workers: true

model_type: causal_transformer
code_dim: 64
codebook_size: 128
num_heads: 8
width: 512

transformer_heads: 4
transformer_layers: 3
transformer_ff_dim: 1024
transformer_dropout: 0.1
context_len: 32
pos_encoding: learned
max_seq_len: 64

commit_weight: 0.25
delta_weight: 3.0
root_pos_weight: 1.0
root_rot_weight: 0.5
root_dt: 0.0166666667

outdir: outputs/vqvae_pruned_causal_transformer
run_name: vqvae_pruned_causal_transformer_test5
resume:
save_every: 0
log_every: 50
data_parallel: false
