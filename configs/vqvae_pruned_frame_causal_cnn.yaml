feature_database: data/processed/100style_test5_pruned/feature_database
split_train: train
split_val: val

batch_size: 256
epochs: 100
lr: 0.0002
min_lr: 0.00001
warmup_epochs: 2
seed: 3407
deterministic: false
grad_clip_norm: 1.0

num_workers: 8
prefetch_factor: 4
pin_memory: true
persistent_workers: true

model_type: frame_causal_cnn
code_dim: 256
codebook_size: 128
num_heads: 8
width: 512
depth: 6
down_t: 0
dilation_growth_rate: 2

commit_weight: 0.25
delta_weight: 1.0

outdir: outputs/vqvae_pruned_frame_causal_cnn
run_name: vqvae_pruned_frame_causal_cnn_test5
resume:
save_every: 0
log_every: 50
data_parallel: false
